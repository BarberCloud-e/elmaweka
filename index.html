<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reserva tu cita</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.css" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#f2f2f7;
}
header{
  background:#000;
  color:#fff;
  padding:15px;
  text-align:center;
  font-size:18px;
}
#calendar{
  max-width:900px;
  margin:30px auto;
  background:#fff;
  padding:15px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}
button{
  background:#000;
  color:#fff;
  border:none;
  padding:8px 12px;
  border-radius:6px;
}
</style>
</head>
<body>

<header id="negocio">Barbería</header>

<div id="calendar"></div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script>

const API="https://script.google.com/macros/s/AKfycbw6MIsDhxzQJx9Ti4POvhHnwLCfZt-KN99OU9z7IpyAjPrPLuwMOPQ17jnHcF9GWdFebA/exec";

document.addEventListener('DOMContentLoaded', async function() {

  const conf=await fetch(API+"?action=config").then(r=>r.json());
  document.getElementById("negocio").innerText=conf.negocio;

  const calendarEl = document.getElementById('calendar');

  const calendar = new FullCalendar.Calendar(calendarEl, {
    initialView: 'dayGridMonth',
    selectable:true,

    dateClick: function(info) {
      const fecha=info.dateStr;
      const hora=prompt("Hora (ej: 14:00)");
      const nombre=prompt("Nombre");

      if(!hora||!nombre) return;

      fetch(API,{
        method:"POST",
        body:JSON.stringify({
          action:"addCita",
          fecha:fecha,
          hora:hora,
          servicio:1,
          nombre:nombre,
          telefono:"",
          email:""
        })
      })
      .then(r=>r.json())
      .then(res=>{
        if(res.ok){
          alert("Reserva confirmada");
          calendar.refetchEvents();
        }else{
          alert(res.error);
        }
      });
    },

    events: async function(fetchInfo, successCallback) {
      const fecha=fetchInfo.startStr.slice(0,7);
      const res=await fetch(API+"?action=citasDia&fecha="+fetchInfo.startStr.slice(0,10)).then(r=>r.json());

      const eventos=res.map(c=>({
        title:c[5],
        start:c[1]+"T"+c[2]
      }));

      successCallback(eventos);
    }

  });

  calendar.render();
});
</script>

</body>
</html>
