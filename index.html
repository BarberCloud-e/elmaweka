<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reservar Cita</title>

<style>
:root{
  --bg:#f5f5f5;
  --card:#ffffff;
  --primary:#111;
  --accent:#000;
}
.dark{
  --bg:#1a1a1a;
  --card:#2a2a2a;
  --primary:#fff;
}
body{
  font-family:Arial;
  background:var(--bg);
  color:var(--primary);
  max-width:500px;
  margin:auto;
  padding:20px;
}
.card{
  background:var(--card);
  padding:20px;
  border-radius:10px;
  margin-bottom:15px;
}
input,select,button{
  width:100%;
  padding:10px;
  margin:8px 0;
}
button{
  background:#000;
  color:#fff;
  border:none;
  cursor:pointer;
}
.slot{
  padding:10px;
  margin:5px 0;
  border:1px solid #ccc;
  cursor:pointer;
}
.slot.ocupado{
  background:#ddd;
  pointer-events:none;
}
</style>
</head>
<body>

<h2 id="titulo">Reservar Cita</h2>

<div class="card">
<select id="servicio"></select>
<input type="date" id="fecha">
<div id="horas"></div>
</div>

<div class="card">
<input type="text" id="nombre" placeholder="Nombre">
<input type="text" id="telefono" placeholder="Teléfono">
<input type="email" id="email" placeholder="Email">
<button onclick="reservar()">Reservar</button>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbw6MIsDhxzQJx9Ti4POvhHnwLCfZt-KN99OU9z7IpyAjPrPLuwMOPQ17jnHcF9GWdFebA/exec";

let servicios=[];
let seleccionHora=null;

async function init(){
  const conf=await fetch(API+"?action=config").then(r=>r.json());
  document.getElementById("titulo").innerText=conf.negocio;

  servicios=await fetch(API+"?action=servicios").then(r=>r.json());

  const sel=document.getElementById("servicio");
  servicios.forEach(s=>{
    const o=document.createElement("option");
    o.value=s.id;
    o.textContent=s.nombre+" - "+s.precio+"€";
    sel.appendChild(o);
  });
}

document.getElementById("fecha").addEventListener("change",cargarHoras);

async function cargarHoras(){
  const fecha=document.getElementById("fecha").value;
  const data=await fetch(API+"?action=citasDia&fecha="+fecha).then(r=>r.json());

  const horasDiv=document.getElementById("horas");
  horasDiv.innerHTML="";
  seleccionHora=null;

  const apertura=9;
  const cierre=20;

  for(let h=apertura;h<cierre;h++){
    for(let m=0;m<60;m+=30){
      const hora=String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");
      const ocupado=data.some(c=>c[2]===hora && c[8]==="confirmada");

      const div=document.createElement("div");
      div.className="slot"+(ocupado?" ocupado":"");
      div.textContent=hora;

      if(!ocupado){
        div.onclick=()=>{
          document.querySelectorAll(".slot").forEach(x=>x.style.background="");
          div.style.background="#000";
          div.style.color="#fff";
          seleccionHora=hora;
        }
      }

      horasDiv.appendChild(div);
    }
  }
}

async function reservar(){

  if(!seleccionHora) return alert("Selecciona hora");

  const payload={
    action:"addCita",
    fecha:fecha.value,
    hora:seleccionHora,
    servicio:servicio.value,
    nombre:nombre.value,
    telefono:telefono.value,
    email:email.value
  };

  const res=await fetch(API,{
    method:"POST",
    body:JSON.stringify(payload)
  }).then(r=>r.json());

  if(res.ok){
    alert("Cita confirmada");
    cargarHoras();
  }else{
    alert(res.error);
  }
}

init();
</script>
</body>
</html>
